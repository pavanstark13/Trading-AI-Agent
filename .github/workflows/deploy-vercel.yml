name: Deploy Frontend to Vercel

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Dashboard to Vercel
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          # Deploy without project linking — Vercel auto-creates project on first deploy
          vercel deploy --prod --token=$VERCEL_TOKEN --yes \
            --name trading-ai-agent-dashboard \
            -e VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }} \
            -e VITE_WS_URL=${{ secrets.VITE_WS_URL }} \
            2>&1 | tee /tmp/vercel_output.txt

          # Extract and print deployment URL
          grep -E "https://.*vercel.app" /tmp/vercel_output.txt | tail -1 || true
          echo "✅ Frontend deployed to Vercel"
