name: Setup Database Schema (Run Once)

on:
  workflow_dispatch:

jobs:
  migrate:
    name: Run Neon Database Schema
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: sudo apt-get install -y postgresql-client

      - name: Run database schema
        env:
          PGPASSWORD: "npg_V9Ww3NPUvzBL"
        run: |
          psql \
            "host=ep-floral-art-aowlextl-pooler.c-2.ap-southeast-1.aws.neon.tech \
             port=5432 \
             dbname=neondb \
             user=neondb_owner \
             sslmode=require" \
            -f infra/postgres/init.sql
          echo "✅ Database schema applied successfully"

      - name: Verify tables created
        env:
          PGPASSWORD: "npg_V9Ww3NPUvzBL"
        run: |
          psql \
            "host=ep-floral-art-aowlextl-pooler.c-2.ap-southeast-1.aws.neon.tech \
             port=5432 \
             dbname=neondb \
             user=neondb_owner \
             sslmode=require" \
            -c "\dt"
          echo "✅ Tables verified"
